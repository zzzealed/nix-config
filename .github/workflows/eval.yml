on:
  push:
    branches: [main]

jobs:
  eval:
    runs-on: [self-hosted, nix]
    steps:
      - name: checkout
        run: |
          if [ -d .git ]; then
            git fetch origin main
            git reset --hard origin/main
          else
            git clone https://github.com/zzzealed/nix-config .
          fi

      - name: eval desktop-nixos
        run: nix eval .#nixosConfigurations.desktop-nixos.config.system.build.toplevel

      - name: eval server-nixos
        run: nix eval .#nixosConfigurations.server-nixos.config.system.build.toplevel

      - name: eval pi-nixos
        run: nix eval .#nixosConfigurations.pi-nixos.config.system.build.toplevel

      - name: eval vps-nixos
        run: nix eval .#nixosConfigurations.vps-nixos.config.system.build.toplevel

      - name: Report success to Gatus
        if: success()
        run: |
          curl -f -X POST \
            -H "Authorization: Bearer ${{ secrets.GATUS_GITHUB_TOKEN }}" \
            "https://status.rotte.city/api/v1/endpoints/github.com/zzzealed/nix-config/actions_eval.yml/external?success=true"

      - name: Report failure to Gatus
        if: failure()
        run: |
          curl -f -X POST \
            -H "Authorization: Bearer ${{ secrets.GATUS_GITHUB_TOKEN }}" \
            "https://status.rotte.city/api/v1/endpoints/github.com/zzzealed/nix-config/actions_eval.yml/external?success=false"
