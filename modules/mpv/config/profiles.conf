[watch-later]
ignore-path-in-watch-later-config=yes # We'll get back to this one
write-filename-in-watch-later-config=yes
watch-later-options=start,volume,sub,aid,vid,sub-delay,sub-speed,sub-pos,sub-visibility,sub-scale,sub-use-margins,sub-ass-force-margins,sub-ass-use-video-data,sub-ass-override,secondary-sid,secondary-sub-delay,secondary-sub-pos,secondary-sub-ass-override,secondary-sub-visibility
save-position-on-quit=yes
resume-playback=yes

[kino]
profile=watch-later
chapters-file="chapters.txt"
sub-auto=no
autocreate-playlist=no
directory-filter-types=video,playlist
osd-playlist-entry=title

[norm]
profile-desc="Normalize audio volume"
af=lavfi=[loudnorm=I=-16:TP=-3:LRA=4]

[big-cache]
demuxer-max-back-bytes=2000M
demuxer-max-bytes=3500M

[vod]
profile=watch-later,big-cache
no-osc
osd-level=1
osd-bar=no
osd-on-seek=no
osd-status-msg=${time-pos}
no-term-osd-bar
quiet=yes
